name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Build frontend and upload dist/ to Hostinger via FTP
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: public_html/

  # Backend auto-pulls via Hostinger Git webhook — nothing to do here.
  # Just remember to click "Restart" in hPanel Node.js app after push,
  # or configure a post-pull hook in hPanel to restart automatically.
